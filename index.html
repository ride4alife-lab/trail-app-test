<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Trail App</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<!-- PWA Manifest -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2ecc71">

<!-- iOS PWA -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon-192.png">

<link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet" />
<script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { margin:0; font-family:Arial; }
#map { position:absolute; top:0; bottom:0; width:100%; }

/* Sidebar */
#sidebar {
    position:absolute;
    top:10px;
    left:10px;
    background:white;
    padding:10px;
    border-radius:6px;
    box-shadow:0 0 8px rgba(0,0,0,0.25);
    z-index:2;
    max-height:70vh;
    overflow-y:auto;
    width:max-content;
    max-width:80vw;
    transition:transform 0.2s;
}
#sidebar.hidden { transform:translateX(-110%); }

#toggleSidebar {
    position:absolute;
    top:10px;
    left:10px;
    z-index:3;
    background:white;
    border:none;
    padding:6px 10px;
    border-radius:6px;
    box-shadow:0 0 6px rgba(0,0,0,0.3);
    font-size:18px;
}

.trail-item { cursor:pointer; padding:3px 0; white-space:nowrap; }

.legend-row {
    display:flex;
    align-items:center;
    gap:6px;
    margin-top:4px;
}
.symbol { width:14px; height:14px; display:inline-block; }
.symbol.easy { background:#2ecc71; border-radius:50%; }
.symbol.intermediate { background:#0074D9; }
.symbol.expert { background:#777777; transform:rotate(45deg); }
.symbol.extreme { background:#000; }

.badge {
    display:inline-block;
    padding:2px 6px;
    border-radius:4px;
    color:white;
    font-size:12px;
    margin-top:4px;
}

.gps-btn {
    position:absolute;
    right:10px;
    background:white;
    border:none;
    padding:8px 10px;
    border-radius:6px;
    box-shadow:0 0 6px rgba(0,0,0,0.3);
    font-size:14px;
    z-index:3;
}
#centerBtn { top:10px; }
#followBtn { top:50px; }
.gps-btn.active { background:#0074D9; color:white; }

#profileContainer {
    position:fixed;
    left:0;
    bottom:0;
    width:100%;
    height:200px;
    background:white;
    box-shadow:0 -2px 6px rgba(0,0,0,0.3);
    display:none;
    z-index:999;
}
#profileHeader {
    display:flex;
    justify-content:space-between;
    padding:4px 10px;
    border-bottom:1px solid #ddd;
    font-size:14px;
}
#closeProfile {
    background:none;
    border:none;
    font-size:18px;
    cursor:pointer;
}
</style>
</head>
<body>

<button id="toggleSidebar">☰</button>

<div id="sidebar">
<b>Trails</b>
<div id="trailList"></div>
<hr>
<b>Difficulty</b>
<div class="legend-row"><span class="symbol easy"></span> Easy</div>
<div class="legend-row"><span class="symbol intermediate"></span> Intermediate</div>
<div class="legend-row"><span class="symbol expert"></span> Expert</div>
<div class="legend-row"><span class="symbol extreme"></span> Extreme</div>
</div>

<button id="centerBtn" class="gps-btn">Center</button>
<button id="followBtn" class="gps-btn">Follow</button>

<div id="map"></div>

<div id="profileContainer">
<div id="profileHeader">
<span id="profileInfo">Elevation Profile</span>
<button id="closeProfile">✕</button>
</div>
<canvas id="profileChart"></canvas>
</div>

<script>
mapboxgl.accessToken = 'pk.eyJ1IjoibHVuZG9uIiwiYSI6ImNtbTB4eWd3YzAzcDgydnEyNGRwYWViN2YifQ.cdVVhtxFaLP6DWSYnGXn2g';

let fullGeoJSON;
let profileChart;
let currentPopup = null;
let followMode = false;

const difficultyColors = {
easy:'#2ecc71',
intermediate:'#0074D9',
expert:'#777777',
extreme:'#000000'
};

function normalizeDifficulty(value){
const d=(value||'').toLowerCase();
if(d.includes('easy')) return 'easy';
if(d.includes('intermediate')) return 'intermediate';
if(d.includes('expert')||d.includes('advanced')) return 'expert';
if(d.includes('extreme')) return 'extreme';
return 'intermediate';
}

const map = new mapboxgl.Map({
container:'map',
style:'mapbox://styles/mapbox/outdoors-v12'
});

/* Sidebar toggle */
document.getElementById('toggleSidebar').onclick=()=>{
document.getElementById('sidebar').classList.toggle('hidden');
};

/* GPS */
const geo=new mapboxgl.GeolocateControl({
positionOptions:{enableHighAccuracy:true},
trackUserLocation:true,
showUserHeading:true
});
map.addControl(geo);

document.getElementById('centerBtn').onclick=()=>geo.trigger();

document.getElementById('followBtn').onclick=function(){
followMode=!followMode;
this.classList.toggle('active',followMode);
};

geo.on('geolocate',e=>{
if(followMode){
map.easeTo({center:[e.coords.longitude,e.coords.latitude]});
}
});

/* Close profile */
document.getElementById('closeProfile').onclick=()=>{
document.getElementById('profileContainer').style.display='none';
map.setFilter('trail-highlight',['==','trailnumber','']);
if(currentPopup) currentPopup.remove();
};

map.on('load',()=>{
fetch('map.geojson?v=2')
.then(r=>r.json())
.then(data=>{

fullGeoJSON=data;

data.features.forEach(f=>{
f.properties._diffNorm=normalizeDifficulty(f.properties.traildifficulty);
});

map.addSource('trails',{type:'geojson',data});

/* Trail lines */
map.addLayer({
id:'trail-lines',
type:'line',
source:'trails',
paint:{
'line-width':6,
'line-color':['match',['get','_diffNorm'],
'easy','#2ecc71',
'intermediate','#0074D9',
'expert','#777777',
'extreme','#000000',
'#0074D9']
}
});

/* Highlight */
map.addLayer({
id:'trail-highlight',
type:'line',
source:'trails',
paint:{'line-width':10,'line-color':'#FFD700'},
filter:['==','trailnumber','']
});

/* AUTO FIT */
const bounds=new mapboxgl.LngLatBounds();
data.features.forEach(feature=>{
feature.geometry.coordinates.forEach(coord=>{
bounds.extend([coord[0],coord[1]]);
});
});
map.fitBounds(bounds,{padding:40});

/* Sidebar */
const list=document.getElementById('trailList');
data.features.forEach(f=>{
const d=document.createElement('div');
d.className='trail-item';
d.textContent=f.properties.trailnumber+' – '+f.properties.trailname;
d.onclick=()=>selectTrail(f);
list.appendChild(d);
});

/* Mobile-safe tap detection */
map.on('click', function(e){
const features = map.queryRenderedFeatures(e.point,{layers:['trail-lines']});
if (!features.length) return;
const num = features[0].properties.trailnumber;
const f = fullGeoJSON.features.find(x=>String(x.properties.trailnumber)===String(num));
if (f) selectTrail(f);
});
});
});

function selectTrail(feature){
const p=feature.properties;
const color=difficultyColors[p._diffNorm];
const coords=feature.geometry.coordinates;

if(currentPopup) currentPopup.remove();

map.setFilter('trail-highlight',
['==',['to-string',['get','trailnumber']],String(p.trailnumber)]
);

const mid=coords[Math.floor(coords.length/2)];

currentPopup=new mapboxgl.Popup()
.setLngLat(mid)
.setHTML(
'<b>'+p.trailname+' ('+p.trailnumber+')</b><br>'+
'<span class="badge" style="background:'+color+'">'+p.traildifficulty+'</span><br>'+
'Zone: '+p.zonename+' ('+p.zonecode+')'
)
.addTo(map);

document.getElementById('profileContainer').style.display='block';
}

/* Register Service Worker */
if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
